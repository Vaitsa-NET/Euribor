<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Euribor tänään</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #111;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    text-align: center;
}
.rate {
    font-size: 48px;
    margin: 20px 0;
}
.small {
    font-size: 18px;
    color: #aaa;
}
</style>
</head>

<body>
<div class="box">
    <h1>Euribor</h1>

    <div class="rate" id="eur3">3 kk: …</div>
    <div class="rate" id="eur12">12 kk: …</div>

    <div class="small" id="date"></div>
</div>

<script>
// Julkiset ECB-pohjaiset lähteet, päivitys kerran päivässä
fetch("https://euribornow.com/api/latest")
.then(res => res.json())
.then(data => {
    document.getElementById("eur3").textContent =
        "3 kk: " + data["3M"].toFixed(3) + " %";
    document.getElementById("eur12").textContent =
        "12 kk: " + data["12M"].toFixed(3) + " %";
    document.getElementById("date").textContent =
        "Päivitetty: " + data.date;
})
.catch(() => {
    document.getElementById("eur3").textContent = "Virhe";
    document.getElementById("eur12").textContent = "Virhe";
});
</script>
</body>
</html>
