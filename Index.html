<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Virralaskuri</title>
 
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
 
<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
}
 
.screen {
    display: flex;
    flex-direction: column;
    height: 100%;
}
 
.header {
    padding: 15px;
    text-align: center;
    background: #111;
}
 
.timer {
    font-size: 40px;
    margin-bottom: 5px;
}
 
.count {
    font-size: 28px;
}
 
.controls button {
    margin: 5px;
    padding: 10px 15px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
}
 
.start-screen {
    padding: 20px;
    text-align: center;
}
 
.start-screen button {
    width: 100%;
    height: 70px;
    font-size: 26px;
    border-radius: 15px;
    border: none;
    margin-top: 15px;
    background: #34c759;
    color: #000;
}
 
.fullscreen-btn {
    flex: 1;
    background: #0a84ff;
    font-size: 48px;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
}
 
.fullscreen-btn:active {
    background: #66aaff;
}
</style>
</head>
 
<body>
 
<div class="screen" id="app">
 
    <!-- Käynnistys -->
    <div class="start-screen" id="startScreen">
        <h2>Valitse aika</h2>
 
        <div class="controls">
            <button onclick="setTime(60)">1 min</button>
            <button onclick="setTime(120)">2 min</button>
            <button onclick="setTime(300)">5 min</button>
            <button onclick="setTime(600)">10 min</button>
        </div>
 
        <button onclick="start()">ALOITA</button>
    </div>
 
    <!-- Laskenta -->
    <div class="header" id="header" style="display:none">
        <div class="timer" id="timer">01:00</div>
        <div class="count">Painallukset: <span id="count">0</span></div>
    </div>
 
    <div class="fullscreen-btn" id="countBtn" style="display:none"
         onclick="addCount()">
        Paina tästä
    </div>
 
</div>
 
<script>
let duration = 60;
let timeLeft = 60;
let count = 0;
let interval;
 
const timerEl = document.getElementById("timer");
const countEl = document.getElementById("count");
const startScreen = document.getElementById("startScreen");
const header = document.getElementById("header");
const countBtn = document.getElementById("countBtn");
 
function setTime(seconds) {
    duration = seconds;
}
 
function start() {
    timeLeft = duration;
    count = 0;
    updateDisplay();
 
    startScreen.style.display = "none";
    header.style.display = "block";
    countBtn.style.display = "flex";
 
    interval = setInterval(() => {
        timeLeft--;
        updateDisplay();
 
        if (timeLeft <= 0) {
            clearInterval(interval);
            countBtn.style.display = "none";
            timerEl.textContent = "VALMIS";
            alert("Aika täynnä!\nPainalluksia: " + count);
            startScreen.style.display = "block";
            header.style.display = "none";
        }
    }, 1000);
}
 
function updateDisplay() {
    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    timerEl.textContent =
        `${min.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`;
    countEl.textContent = count;
}
 
function addCount() {
    count++;
    countEl.textContent = count;
}
</script>
 
</body>
</html>
